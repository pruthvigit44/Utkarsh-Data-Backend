services:
  - type: web
    name: utkarsh-backend
    env: node
    region: oregon
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm start
    envVars:
      - key: NODE_VERSION
        value: "18"
      - key: NODE_OPTIONS
        value: "--openssl-legacy-provider"
      - key: MONGO_URI
        sync: false
      - key: NODE_ENV
        value: production
      - key: GOOGLE_CLIENT_EMAIL
        sync: false
      - key: GOOGLE_PRIVATE_KEY
        sync: false
